<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Life RPG — Gamify your life. Earn XP for real-world achievements." />
  <title>Life RPG</title>
  <link rel="stylesheet" href="styles.css" />

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Env vars injected at build time by netlify.toml -->
  <script>
    window.ENV_SUPABASE_URL  = '__SUPABASE_URL__';
    window.ENV_SUPABASE_ANON = '__SUPABASE_ANON_KEY__';
  </script>
</head>
<body>

  <!-- ─── CONFETTI + TOAST CONTAINERS ────────────────────────────────────── -->
  <div id="confetti-container"></div>
  <div id="toast-container"></div>

  <!-- ─── PROFILE SELECTOR SCREEN ──────────────────────────────────────────── -->
  <div id="profile-screen">
    <div class="profile-selector">
      <div class="profile-selector-logo">⚔️</div>
      <h1 class="profile-selector-title">Life RPG</h1>
      <p class="profile-selector-subtitle">Choose your adventurer</p>

      <div class="profile-cards" id="profile-cards">
        <div class="loading-spinner"></div>
      </div>

      <button class="btn btn-gold profile-new-btn" id="new-profile-btn">+ New Profile</button>
    </div>

    <!-- New profile modal -->
    <div class="modal-overlay hidden" id="new-profile-modal">
      <div class="modal">
        <h3 class="modal-title">Create Profile</h3>
        <input
          class="input"
          id="new-profile-name"
          placeholder="Enter your name"
          maxlength="30"
          autocomplete="off"
        />
        <p class="modal-body">Pick an avatar:</p>
        <div class="avatar-grid" id="new-profile-avatar-grid"></div>
        <div class="modal-actions">
          <button class="btn btn-ghost" id="cancel-new-profile">Cancel</button>
          <button class="btn btn-primary" id="confirm-new-profile">Create</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ─── APP SHELL ────────────────────────────────────────────────────────── -->
  <div id="app-shell" class="hidden">

    <!-- HEADER -->
    <header class="app-header">
      <span class="header-brand">⚔️ Life RPG</span>

      <div class="header-profile">
        <span class="header-level" id="header-level">Lv.1</span>
        <span class="header-name"  id="header-name">Adventurer</span>
        <div class="header-xp-wrapper">
          <div class="header-xp-track">
            <div class="header-xp-fill" id="header-xp-bar"></div>
          </div>
          <span class="header-xp-pct" id="header-xp-pct">0/100</span>
        </div>
      </div>

      <div class="header-actions">
        <button id="theme-toggle" title="Toggle theme">☀️</button>
        <button id="switch-profile-btn" title="Switch profile">Switch Profile</button>
      </div>
    </header>

    <!-- BODY -->
    <div class="app-body">

      <!-- SIDEBAR NAV (desktop) -->
      <nav class="sidebar-nav">
        <button class="nav-item active" data-screen="character">
          <span class="nav-icon">🧙</span> Character
        </button>
        <button class="nav-item" data-screen="quests">
          <span class="nav-icon">⚔️</span> Activity
        </button>
        <button class="nav-item" data-screen="rewards">
          <span class="nav-icon">🎁</span> Rewards
        </button>
        <button class="nav-item" data-screen="journal">
          <span class="nav-icon">📖</span> Journal
        </button>
        <button class="nav-item" data-screen="reflection">
          <span class="nav-icon">🪞</span> Reflection
        </button>
        <button class="nav-item" data-screen="budget">
          <span class="nav-icon">💳</span> Budget
        </button>
      </nav>

      <!-- MAIN CONTENT -->
      <main id="screen-content">
        <div class="loading-spinner"></div>
      </main>

    </div><!-- /.app-body -->

    <!-- BOTTOM NAV (mobile) -->
    <nav class="bottom-nav">
      <button class="nav-item active" data-screen="character">
        <span class="nav-icon">🧙</span>
        <span>Hero</span>
      </button>
      <button class="nav-item" data-screen="quests">
        <span class="nav-icon">⚔️</span>
        <span>Activity</span>
      </button>
      <button class="nav-item" data-screen="rewards">
        <span class="nav-icon">🎁</span>
        <span>Rewards</span>
      </button>
      <button class="nav-item" data-screen="journal">
        <span class="nav-icon">📖</span>
        <span>Journal</span>
      </button>
      <button class="nav-item" data-screen="reflection">
        <span class="nav-icon">🪞</span>
        <span>Reflect</span>
      </button>
      <button class="nav-item" data-screen="budget">
        <span class="nav-icon">💳</span>
        <span>Budget</span>
      </button>
    </nav>

  </div><!-- /#app-shell -->

  <!-- MAIN APP -->
  <script type="module" src="app.js"></script>
</body>
</html>
