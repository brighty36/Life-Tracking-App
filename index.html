<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Life Tracker — Earn XP for real-world achievements." />
  <title>Life Tracker</title>
  <link rel="stylesheet" href="styles.css" />

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Env vars injected at build time by netlify.toml -->
  <script>
    window.ENV_SUPABASE_URL  = '__SUPABASE_URL__';
    window.ENV_SUPABASE_ANON = '__SUPABASE_ANON_KEY__';
  </script>
</head>
<body>

  <!-- ─── CONFETTI + TOAST CONTAINERS ────────────────────────────────────── -->
  <div id="confetti-container"></div>
  <div id="toast-container"></div>

  <!-- ─── PROFILE SELECTOR SCREEN ──────────────────────────────────────────── -->
  <div id="profile-screen">
    <div class="profile-selector">
      <h1 class="profile-selector-title">Life Tracker</h1>
      <p class="profile-selector-subtitle">Select profile</p>

      <div class="profile-cards" id="profile-cards">
        <div class="loading-spinner"></div>
      </div>

      <button class="btn btn-primary profile-new-btn" id="new-profile-btn">+ New Profile</button>
    </div>

    <!-- New profile modal -->
    <div class="modal-overlay hidden" id="new-profile-modal">
      <div class="modal">
        <h3 class="modal-title">Create Profile</h3>
        <input
          class="input"
          id="new-profile-name"
          placeholder="Enter your name"
          maxlength="30"
          autocomplete="off"
        />
        <div class="modal-actions">
          <button class="btn btn-ghost" id="cancel-new-profile">Cancel</button>
          <button class="btn btn-primary" id="confirm-new-profile">Create</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ─── APP SHELL ────────────────────────────────────────────────────────── -->
  <div id="app-shell" class="hidden">

    <!-- HEADER -->
    <header class="app-header">
      <span class="header-brand">Life Tracker</span>

      <div class="header-profile">
        <span class="header-name" id="header-name">Profile</span>
        <div class="header-xp-wrapper">
          <span class="header-xp-block"><span id="header-daily-xp">0</span> today</span>
          <span class="header-xp-block"><span id="header-lifetime-xp">0</span> total</span>
        </div>
      </div>

      <div class="header-actions">
        <button id="theme-toggle" title="Toggle theme">Dark</button>
        <button id="switch-profile-btn" title="Switch profile">Switch</button>
      </div>
    </header>

    <!-- BODY -->
    <div class="app-body">

      <!-- SIDEBAR NAV (desktop) -->
      <nav class="sidebar-nav">
        <button class="nav-item active" data-screen="character">Character</button>
        <button class="nav-item" data-screen="quests">Activity</button>
        <button class="nav-item" data-screen="rewards">Rewards</button>
        <button class="nav-item" data-screen="journal">Journal</button>
        <button class="nav-item" data-screen="reflection">Reflection</button>
        <button class="nav-item" data-screen="budget">Budget</button>
      </nav>

      <!-- MAIN CONTENT -->
      <main id="screen-content">
        <div class="loading-spinner"></div>
      </main>

    </div><!-- /.app-body -->

    <!-- BOTTOM NAV (mobile) -->
    <nav class="bottom-nav">
      <button class="nav-item active" data-screen="character">
        <span>Hero</span>
      </button>
      <button class="nav-item" data-screen="quests">
        <span>Activity</span>
      </button>
      <button class="nav-item" data-screen="rewards">
        <span>Rewards</span>
      </button>
      <button class="nav-item" data-screen="journal">
        <span>Journal</span>
      </button>
      <button class="nav-item" data-screen="reflection">
        <span>Reflect</span>
      </button>
      <button class="nav-item" data-screen="budget">
        <span>Budget</span>
      </button>
    </nav>

  </div><!-- /#app-shell -->

  <!-- MAIN APP -->
  <script type="module" src="app.js"></script>
</body>
</html>
