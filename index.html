<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Life Tracker — Earn XP for real-world achievements." />
  <title>Life Tracker</title>
  <link rel="stylesheet" href="styles.css" />

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Env vars injected at build time by netlify.toml -->
  <script>
    window.ENV_SUPABASE_URL  = '__SUPABASE_URL__';
    window.ENV_SUPABASE_ANON = '__SUPABASE_ANON_KEY__';
  </script>
</head>
<body>

  <!-- ─── CONFETTI + TOAST CONTAINERS ────────────────────────────────────── -->
  <div id="confetti-container"></div>
  <div id="toast-container"></div>

  <!-- ─── AUTH SCREEN ──────────────────────────────────────────────────────── -->
  <div id="auth-screen">
    <div class="auth-container">
      <h1 class="auth-title">Life Tracker</h1>

      <div class="auth-tabs">
        <button class="auth-tab active" id="auth-tab-signin">Sign in</button>
        <button class="auth-tab" id="auth-tab-signup">Sign up</button>
      </div>

      <div class="auth-form">
        <input class="input" id="auth-email" type="email" placeholder="Email" autocomplete="email" />
        <input class="input" id="auth-password" type="password" placeholder="Password" autocomplete="current-password" />
        <button class="btn btn-primary auth-submit-btn" id="auth-submit">Sign in</button>
        <p class="auth-error hidden" id="auth-error"></p>
      </div>
    </div>

    <!-- Profile setup modal — shown on first login only -->
    <div class="modal-overlay hidden" id="profile-setup-modal">
      <div class="modal">
        <h3 class="modal-title">Set up your profile</h3>
        <p class="modal-subtitle">What should we call you?</p>
        <input class="input" id="profile-setup-name" placeholder="Your name" maxlength="30" autocomplete="off" />
        <div class="modal-actions">
          <button class="btn btn-primary" id="profile-setup-confirm">Get started</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ─── APP SHELL ────────────────────────────────────────────────────────── -->
  <div id="app-shell" class="hidden">

    <!-- HEADER -->
    <header class="app-header">
      <span class="header-brand">Life Tracker</span>

      <div class="header-profile">
        <span class="header-name" id="header-name">Profile</span>
        <div class="header-xp-wrapper">
          <span class="header-xp-block"><span id="header-daily-xp">0</span> today</span>
          <span class="header-xp-block"><span id="header-lifetime-xp">0</span> total</span>
        </div>
      </div>

      <div class="header-actions">
        <button id="theme-toggle" title="Toggle theme">Dark</button>
        <button id="sign-out-btn" title="Sign out">Sign out</button>
      </div>
    </header>

    <!-- BODY -->
    <div class="app-body">

      <!-- SIDEBAR NAV (desktop) -->
      <nav class="sidebar-nav">
        <button class="nav-item active" data-screen="character">Character</button>
        <button class="nav-item" data-screen="quests">Activity</button>
        <button class="nav-item" data-screen="rewards">Rewards</button>
        <button class="nav-item" data-screen="journal">Journal</button>
        <button class="nav-item" data-screen="reflection">Reflection</button>
        <button class="nav-item" data-screen="budget">Budget</button>
      </nav>

      <!-- MAIN CONTENT -->
      <main id="screen-content">
        <div class="loading-spinner"></div>
      </main>

    </div><!-- /.app-body -->

    <!-- BOTTOM NAV (mobile) -->
    <nav class="bottom-nav">
      <button class="nav-item active" data-screen="character">
        <span>Hero</span>
      </button>
      <button class="nav-item" data-screen="quests">
        <span>Activity</span>
      </button>
      <button class="nav-item" data-screen="rewards">
        <span>Rewards</span>
      </button>
      <button class="nav-item" data-screen="journal">
        <span>Journal</span>
      </button>
      <button class="nav-item" data-screen="reflection">
        <span>Reflect</span>
      </button>
      <button class="nav-item" data-screen="budget">
        <span>Budget</span>
      </button>
    </nav>

  </div><!-- /#app-shell -->

  <!-- MAIN APP -->
  <script type="module" src="app.js"></script>
</body>
</html>
